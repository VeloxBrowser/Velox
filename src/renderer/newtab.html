<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>New Tab - Velox</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #08080c;
      color: #e8eaf0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    /* Animated gradient background */
    .bg-glow {
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.12;
      animation: float 12s ease-in-out infinite;
    }
    .bg-glow.purple { background: #a855f7; top: -200px; left: -100px; }
    .bg-glow.cyan { background: #06b6d4; bottom: -200px; right: -100px; animation-delay: -6s; }
    .bg-glow.blue { background: #3b82f6; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 400px; height: 400px; animation-delay: -3s; }
    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -20px) scale(1.05); }
      66% { transform: translate(-20px, 30px) scale(0.95); }
    }
    .content { position: relative; z-index: 1; text-align: center; width: 100%; max-width: 640px; padding: 20px; }
    /* Logo */
    .logo { margin-bottom: 8px; }
    .logo svg { filter: drop-shadow(0 0 20px rgba(168,85,247,0.3)); }
    .brand-text {
      font-size: 42px; font-weight: 800; letter-spacing: -1px;
      background: linear-gradient(135deg, #a855f7 0%, #06b6d4 50%, #a855f7 100%);
      background-size: 200% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      animation: shimmer 4s linear infinite;
      margin-bottom: 6px;
    }
    @keyframes shimmer { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }
    .tagline { font-size: 14px; color: #555770; font-weight: 400; margin-bottom: 40px; letter-spacing: 0.3px; }
    /* Search Bar */
    .search-container {
      position: relative; margin-bottom: 48px;
    }
    .search-bar {
      width: 100%; height: 52px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 0 20px 0 48px;
      font-size: 15px; color: #e8eaf0;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s ease;
      outline: none;
    }
    .search-bar::placeholder { color: #444660; }
    .search-bar:focus {
      border-color: rgba(168,85,247,0.4);
      box-shadow: 0 0 0 4px rgba(168,85,247,0.08), 0 8px 32px rgba(0,0,0,0.3);
      background: rgba(255,255,255,0.06);
    }
    .search-icon {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      color: #555770; pointer-events: none;
    }
    /* Quick Links */
    .quick-links {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 12px; max-width: 480px; margin: 0 auto;
    }
    .quick-link {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      padding: 18px 12px; border-radius: 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      cursor: pointer; transition: all 0.25s ease;
      text-decoration: none; color: inherit;
    }
    .quick-link:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(168,85,247,0.3);
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    .quick-link-icon {
      width: 40px; height: 40px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .quick-link-name { font-size: 11px; color: #8b8da3; font-weight: 500; }
    .ql-1 { background: rgba(168,85,247,0.15); }
    .ql-2 { background: rgba(6,182,212,0.15); }
    .ql-3 { background: rgba(239,68,68,0.15); }
    .ql-4 { background: rgba(16,185,129,0.15); }
    /* Clock */
    .clock {
      position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%);
      font-size: 13px; color: #444660; font-weight: 400; letter-spacing: 0.5px;
    }
    /* Privacy badge */
    .privacy-badge {
      position: absolute; bottom: 32px; right: 32px;
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: #10b981; font-weight: 500;
      background: rgba(16,185,129,0.08); padding: 6px 12px;
      border-radius: 20px; border: 1px solid rgba(16,185,129,0.15);
    }
    .privacy-dot { width: 6px; height: 6px; border-radius: 50%; background: #10b981; animation: blink 2s ease-in-out infinite; }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  </style>
</head>
<body>
  <div class="bg-glow purple"></div>
  <div class="bg-glow cyan"></div>
  <div class="bg-glow blue"></div>

  <div class="content">
    <div class="logo">
      <img src="../../assets/icon.png" width="80" height="80" style="border-radius: 20px; filter: drop-shadow(0 0 20px rgba(168,85,247,0.3));">
    </div>
    <div class="brand-text">Velox</div>
    <div class="tagline">Fast. Private. Unstoppable.</div>

    <div class="search-container">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-bar" id="search" type="text" placeholder="Search the web or enter a URL..." autofocus spellcheck="false">
    </div>

    <div class="quick-links">
      <a class="quick-link" data-url="https://www.google.com">
        <div class="quick-link-icon ql-1">🔍</div>
        <span class="quick-link-name">Google</span>
      </a>
      <a class="quick-link" data-url="https://www.youtube.com">
        <div class="quick-link-icon ql-2">▶️</div>
        <span class="quick-link-name">YouTube</span>
      </a>
      <a class="quick-link" data-url="https://github.com">
        <div class="quick-link-icon ql-3">💻</div>
        <span class="quick-link-name">GitHub</span>
      </a>
      <a class="quick-link" data-url="https://chatgpt.com">
        <div class="quick-link-icon ql-4" style="background: rgba(16,163,127,0.15);">🤖</div>
        <span class="quick-link-name">ChatGPT</span>
      </a>
    </div>
  </div>

  <div class="clock" id="clock"></div>
  <div class="privacy-badge"><div class="privacy-dot"></div>Privacy Protected</div>

  <script>
    // Clock
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true }) + ' — ' + now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    }
    updateClock(); setInterval(updateClock, 1000);

    // Search - communicate with parent via postMessage or direct navigation
    document.getElementById('search').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const q = e.target.value.trim();
        if (q) {
          const isUrl = /^(https?:\/\/|[a-zA-Z0-9][-a-zA-Z0-9]*\.[a-zA-Z]{2,})/.test(q);
          window.location.href = isUrl ? (q.startsWith('http') ? q : 'https://' + q) : 'https://duckduckgo.com/?q=' + encodeURIComponent(q);
        }
      }
    });

    // Quick links
    document.querySelectorAll('.quick-link').forEach(link => {
      link.addEventListener('click', () => {
        window.location.href = link.dataset.url;
      });
    });
  </script>
</body>
</html>
