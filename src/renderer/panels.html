<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
  <style>
    body { background: transparent !important; overflow: hidden; margin: 0; padding: 0; }
    .panel {
      display: none;
      position: absolute;
      top: 0;
      right: 15px; /* Adjust as needed */
      width: 320px;
      margin: 0;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    }
    .midnight-cyber { background: transparent !important; }
  </style>
</head>
<body class="midnight-cyber">
  <div id="proxy-panel" class="panel">
    <h3 style="color:white; margin-bottom:15px; font-size:16px;">🌐 Velox Network</h3>
    <div class="proxy-info-card" id="proxy-card" style="background:rgba(255,255,255,0.03); border-radius:8px; padding:12px; border:1px solid rgba(255,255,255,0.05); margin-bottom:15px;">
      <div style="display:flex; justify-content:space-between; font-size:12px;">
        <span style="color:#8b8da3;">Status</span>
        <span id="proxy-status-value" style="color:white; font-weight:600;">Disconnected</span>
      </div>
    </div>
    <button id="proxy-auto" class="btn-accent" style="width:100%; padding:12px; background:linear-gradient(135deg, #a855f7, #06b6d4); color:white; border-radius:8px; font-weight:700; font-size:13px; margin-bottom:10px;">Connect to Velox</button>
    <button id="proxy-disconnect" class="btn-danger" style="display:none; width:100%; padding:12px; background:rgba(239, 68, 68, 0.15); color:#ef4444; border-radius:8px; font-weight:700; font-size:13px;">Disconnect</button>
    <button id="proxy-panel-close" style="margin-top:10px; color:#555770; font-size:12px; text-decoration:underline;">Close</button>
  </div>

  <div id="adblock-panel" class="panel">
    <h3 style="color:white; margin-bottom:15px; font-size:16px;">🛡️ AdBlock Plus</h3>
    <div class="proxy-info-card" style="background:rgba(255,255,255,0.03); border-radius:8px; padding:12px; border:1px solid rgba(255,255,255,0.05); margin-bottom:15px;">
      <div style="display:flex; justify-content:space-between; font-size:12px;">
        <span style="color:#8b8da3;">Blocked Ads</span>
        <span id="status-blocked-panel" style="color:#10b981; font-weight:600;">0 blocked</span>
      </div>
    </div>
    <button id="adblock-toggle-btn" class="btn-accent" style="width:100%; padding:12px; background:linear-gradient(135deg, #10b981, #06b6d4); color:white; border-radius:8px; font-weight:700; font-size:13px; margin-bottom:10px;">Enable AdBlock</button>
    <button id="adblock-panel-close" style="margin-top:10px; color:#555770; font-size:12px; text-decoration:underline;">Close</button>
  </div>

  <div id="duck-panel" class="panel">
    <h3 style="color:white; margin-bottom:15px; font-size:16px;">🦆 DuckDuckGo Privacy</h3>
    <div class="proxy-info-card" style="background:rgba(255,255,255,0.03); border-radius:8px; padding:12px; border:1px solid rgba(255,255,255,0.05); margin-bottom:15px;">
      <p style="font-size:12px; color:#8b8da3; margin-bottom:10px;">Your search is always private. Trackers are blocked by default.</p>
      <div style="display:flex; justify-content:space-between; font-size:12px;">
        <span style="color:#8b8da3;">Search Engine</span>
        <span id="current-search-engine" style="color:#de5833; font-weight:600;">Google</span>
      </div>
    </div>
    <button id="duck-toggle-btn" class="btn-accent" style="width:100%; padding:12px; background:linear-gradient(135deg, #de5833, #f59e0b); color:white; border-radius:8px; font-weight:700; font-size:13px; margin-bottom:10px;">Enable Private Search</button>
    <div id="private-search-badge" style="display:none; padding:10px; background:rgba(255,215,0,0.05); border:1px solid rgba(255,215,0,0.1); border-radius:8px;">
      <p style="font-size:11px; color:#ffd700;">✨ Private Search Mode Active</p>
    </div>
    <button id="duck-panel-close" style="margin-top:10px; color:#555770; font-size:12px; text-decoration:underline;">Close</button>
  </div>

  <script src="panels-app.js"></script>
</body>
</html>
